name: Linux

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: "${{matrix.os}} ${{matrix.compiler}} ${{matrix.build_type}} ${{matrix.sanitizer}}"
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        compiler: [clang, gcc]
        build_type: [Debug, Release]
        os: [ubuntu-latest]
        sanitizer: [ASan, LSan, MSan, TSan, UBSan]
        include:
          - compiler: clang
            cc: clang-18
            cxx: clang++-18
            packages: clang-18 libc++-18-dev libc++abi-18-dev
          - compiler: gcc
            cc: gcc-14
            cxx: g++-14
            packages: g++-14 libstdc++-14-dev
        exclude:
          - compiler: gcc
            sanitizer: MSan # Not supported

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: 'recursive'

    - name: Install
      run: |
        sudo sysctl vm.mmap_rnd_bits=28
        sudo apt-get update
        sudo apt-get install ${{matrix.packages}} cmake ninja-build
        ${{matrix.cc}} --version
        ${{matrix.cxx}} --version
        cmake --version
        ninja --version
        cmake -E make_directory ${{runner.workspace}}/build

    - name: Configure
      working-directory: ${{runner.workspace}}/build
      run: |
        echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV
        cmake \
          -DCMAKE_BUILD_TYPE=${{matrix.build_type}} \
          -DCMAKE_C_COMPILER=${{matrix.cc}} \
          -DCMAKE_CXX_COMPILER=${{matrix.cxx}} \
          -DSANITIZER=${{matrix.sanitizer}} \
          -G "Ninja" \
          -S ${{github.workspace}}

    - name: Build
      working-directory: ${{runner.workspace}}/build
      run: |
        cmake --build . --config ${{matrix.build_type}} --target tean_tests

    - name: Test
      working-directory: ${{runner.workspace}}/build
      run: |
        ctest --build-config ${{matrix.build_type}} --output-on-failure